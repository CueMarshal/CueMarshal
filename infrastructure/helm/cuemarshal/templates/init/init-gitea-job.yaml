apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cuemarshal.fullname" . }}-init-gitea
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "cuemarshal.selectorLabels" . | nindent 8 }}
        component: init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "cuemarshal.fullname" . }}-init-gitea
      initContainers:
      - name: wait-for-gitea
        image: curlimages/curl:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          until curl -sf http://{{ include "cuemarshal.fullname" . }}-gitea:3000/api/v1/version; do
            echo "Waiting for Gitea..."
            sleep 5
          done
          echo "Gitea is ready"
      containers:
      - name: init
        image: {{ .Values.gitea.image }}
        command: ["/bin/sh", "/scripts/init-gitea.sh"]
        env:
        - name: GITEA_URL
          value: "http://{{ include "cuemarshal.fullname" . }}-gitea:3000"
        - name: GITEA_EXTERNAL_URL
          value: "{{ if .Values.ingress.tls.enabled }}https{{ else }}http{{ end }}://{{ include "cuemarshal.fqdn" . }}"
        - name: GITEA_ADMIN_USER
          value: "{{ .Values.workspace.slug }}-admin"
        - name: GITEA_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: gitea-admin-password
        - name: GITEA_ADMIN_EMAIL
          value: "admin@{{ .Values.workspace.slug }}.local"
        - name: CONDUCTOR_ORG
          value: {{ .Values.workspace.slug | quote }}
        - name: WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: webhook-secret
        - name: API_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: conductor-secret
        - name: CONFIGMAP_NAME
          value: "{{ include "cuemarshal.fullname" . }}-oauth-config"
        - name: K8S_SECRET_NAME
          value: "{{ include "cuemarshal.fullname" . }}-secrets"
        {{- if .Values.auth.google.clientId }}
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: google-client-id
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: google-client-secret
        {{- end }}
        {{- if .Values.sonarqube.enabled }}
        - name: SONAR_URL
          value: "http://{{ include "cuemarshal.fullname" . }}-sonarqube:9000/sonar"
        {{- end }}
        volumeMounts:
        - name: init-script
          mountPath: /scripts
        - name: tokens
          mountPath: /tokens
        - name: gitea-data
          mountPath: /data
      volumes:
      - name: init-script
        configMap:
          name: {{ include "cuemarshal.fullname" . }}-init-script
          defaultMode: 0755
      - name: tokens
        persistentVolumeClaim:
          claimName: {{ include "cuemarshal.fullname" . }}-tokens
      - name: gitea-data
        {{- if .Values.gitea.persistence.enabled }}
        persistentVolumeClaim:
          claimName: data-{{ include "cuemarshal.fullname" . }}-gitea-0
        {{- else }}
        emptyDir: {}
        {{- end }}
