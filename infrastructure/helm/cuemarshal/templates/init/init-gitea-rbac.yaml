---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cuemarshal.fullname" . }}-init-gitea
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: init
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cuemarshal.fullname" . }}-init-gitea
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: init
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["{{ include "cuemarshal.fullname" . }}-oauth-config"]
  verbs: ["get", "patch", "update"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["{{ include "cuemarshal.fullname" . }}-secrets"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cuemarshal.fullname" . }}-init-gitea
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: init
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cuemarshal.fullname" . }}-init-gitea
subjects:
- kind: ServiceAccount
  name: {{ include "cuemarshal.fullname" . }}-init-gitea
