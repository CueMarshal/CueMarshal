apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cuemarshal.fullname" . }}-tokens
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: tokens
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storage.storageClass | default "standard" }}
  resources:
    requests:
      storage: 100Mi
