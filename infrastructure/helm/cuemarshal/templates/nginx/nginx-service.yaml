apiVersion: v1
kind: Service
metadata:
  name: {{ include "cuemarshal.fullname" . }}-nginx
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: nginx
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  selector:
    {{- include "cuemarshal.selectorLabels" . | nindent 4 }}
    component: nginx
