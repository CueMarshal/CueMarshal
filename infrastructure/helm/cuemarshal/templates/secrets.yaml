apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cuemarshal.fullname" . }}-secrets
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
  
  # Redis
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  
  # LiteLLM Gateway
  litellm-master-key: {{ .Values.secrets.litellmMasterKey | quote }}
  
  # Conductor
  webhook-secret: {{ .Values.secrets.webhookSecret | quote }}
  conductor-secret: {{ .Values.secrets.conductorSecret | quote }}
  
  # Gitea
  gitea-admin-password: {{ .Values.secrets.giteaAdminPassword | quote }}
  
  # LLM Provider API Keys
  {{- if .Values.llm.groqApiKey }}
  groq-api-key: {{ .Values.llm.groqApiKey | quote }}
  {{- end }}
  {{- if .Values.llm.geminiApiKey }}
  gemini-api-key: {{ .Values.llm.geminiApiKey | quote }}
  {{- end }}
  {{- if .Values.llm.azureAiApiKey }}
  azure-ai-api-key: {{ .Values.llm.azureAiApiKey | quote }}
  {{- end }}
  
  # Google OAuth (if configured)
  {{- if .Values.auth.google.clientId }}
  google-client-id: {{ .Values.auth.google.clientId | quote }}
  google-client-secret: {{ .Values.auth.google.clientSecret | quote }}
  {{- end }}
