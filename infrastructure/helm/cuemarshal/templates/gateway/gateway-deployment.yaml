apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cuemarshal.fullname" . }}-gateway
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cuemarshal.selectorLabels" . | nindent 6 }}
      component: gateway
  template:
    metadata:
      labels:
        {{- include "cuemarshal.selectorLabels" . | nindent 8 }}
        component: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: gateway
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        image: {{ include "cuemarshal.image" (dict "Values" .Values "component" "gateway") }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/bin/sh", "-c"]
        args:
        - |
          export DATABASE_URL="postgresql://{{ .Values.postgres.user | default "cuemarshal" }}:${POSTGRES_PASSWORD}@{{ include "cuemarshal.fullname" . }}-postgres:5432/litellm"
          export REDIS_URL="redis://:${REDIS_PASSWORD}@{{ include "cuemarshal.fullname" . }}-redis:6379"
          python3 /app/render_litellm_config.py /app/config.yaml /tmp/litellm_config.yaml
          exec litellm --config /tmp/litellm_config.yaml --port 80 --num_workers 1
        env:
        {{- if .Values.llm.groqApiKey }}
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: groq-api-key
        {{- end }}
        {{- if .Values.llm.geminiApiKey }}
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: gemini-api-key
        {{- end }}
        {{- if .Values.llm.geminiApiKey2 }}
        - name: GEMINI_API_KEY_2
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: gemini-api-key-2
        {{- end }}
        {{- if .Values.llm.geminiApiKey3 }}
        - name: GEMINI_API_KEY_3
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: gemini-api-key-3
        {{- end }}
        {{- if .Values.llm.azureAiApiKey }}
        - name: AZURE_AI_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: azure-ai-api-key
        - name: AZURE_AI_API_BASE
          value: {{ .Values.llm.azureAiApiBase | quote }}
        {{- end }}
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: litellm-master-key
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.postgres.user | default "cuemarshal" }}:$(POSTGRES_PASSWORD)@{{ include "cuemarshal.fullname" . }}-postgres:5432/litellm"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: postgres-password
        - name: REDIS_HOST
          value: {{ include "cuemarshal.fullname" . }}-redis
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: redis-password
        ports:
        - name: http
          containerPort: 80
        livenessProbe:
          httpGet:
            path: /health/liveliness
            port: http
          initialDelaySeconds: 120
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          {{- toYaml .Values.gateway.resources | nindent 10 }}
