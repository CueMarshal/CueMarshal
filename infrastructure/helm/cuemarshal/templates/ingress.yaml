{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cuemarshal.fullname" . }}
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ include "cuemarshal.fqdn" . }}
    secretName: {{ include "cuemarshal.fullname" . }}-tls
  {{- end }}
  rules:
  - host: {{ include "cuemarshal.fqdn" . }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "cuemarshal.fullname" . }}-nginx
            port:
              number: 80
{{- end }}
