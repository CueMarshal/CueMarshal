apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cuemarshal.fullname" . }}-gitea-config
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: gitea
data:
  app.ini: |
    WORK_PATH = /data/gitea
    
    [server]
    DOMAIN = {{ include "cuemarshal.fqdn" . }}
    ROOT_URL = {{ if .Values.ingress.tls.enabled }}https{{ else }}http{{ end }}://{{ include "cuemarshal.fqdn" . }}/
    HTTP_PORT = 3000
    SSH_DOMAIN = {{ include "cuemarshal.fqdn" . }}
    SSH_PORT = 22
    SSH_LISTEN_PORT = 22
    LFS_START_SERVER = true
    OFFLINE_MODE = false
    APP_DATA_PATH = /data/gitea
    
    [database]
    DB_TYPE = postgres
    HOST = {{ include "cuemarshal.fullname" . }}-postgres:5432
    NAME = gitea
    USER = {{ .Values.postgres.user | default "cuemarshal" }}
    PASSWD = POSTGRES_PASSWORD_PLACEHOLDER
    SSL_MODE = disable
    
    [repository]
    ROOT = /data/git/repositories
    DEFAULT_BRANCH = main
    ENABLE_PUSH_CREATE_USER = true
    ENABLE_PUSH_CREATE_ORG = true
    
    [security]
    INSTALL_LOCK = true
    
    [service]
    DISABLE_REGISTRATION = true
    REQUIRE_SIGNIN_VIEW = false
    ENABLE_CAPTCHA = false
    DEFAULT_ALLOW_CREATE_ORGANIZATION = true
    
    [service.explore]
    REQUIRE_SIGNIN_VIEW = false
    DISABLE_USERS_PAGE = false
    
    [session]
    PROVIDER = memory
    
    [actions]
    ENABLED = true
    DEFAULT_ACTIONS_URL = github
    
    [webhook]
    ALLOWED_HOST_LIST = *
    SKIP_TLS_VERIFY = true
    
    [oauth2]
    ENABLED = true
    
    [oauth2_client]
    REGISTER_EMAIL_CONFIRM = false
    ENABLE_AUTO_REGISTRATION = true
    USERNAME = nickname
    
    [indexer]
    REPO_INDEXER_ENABLED = true
    REPO_INDEXER_TYPE = bleve
    ISSUE_INDEXER_TYPE = bleve
    
    [git]
    MAX_GIT_DIFF_LINES = 10000
    MAX_GIT_DIFF_LINE_CHARACTERS = 5000
    MAX_GIT_DIFF_FILES = 100
    
    [api]
    ENABLE_SWAGGER = true
    
    [log]
    MODE = console
    LEVEL = Info
