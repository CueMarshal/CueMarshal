apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cuemarshal.fullname" . }}-nginx-config
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: nginx
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        
        # Logging
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
        
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;
        
        # Performance
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        client_max_body_size 100M;
        
        # Gzip
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript
                   application/json application/javascript application/xml+rss
                   application/rss+xml font/truetype font/opentype
                   application/vnd.ms-fontobject image/svg+xml;
        
        # Rate limiting zone
        limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/s;
        
        # Upstreams
        upstream gitea {
            server {{ include "cuemarshal.fullname" . }}-gitea:3000;
        }
        
        upstream conductor {
            server {{ include "cuemarshal.fullname" . }}-conductor:80;
        }
        
        upstream landing {
            server {{ include "cuemarshal.fullname" . }}-landing:80;
        }
        
        {{- if .Values.monitoring.enabled }}
        upstream grafana {
            server {{ include "cuemarshal.fullname" . }}-grafana:3000 max_fails=3 fail_timeout=30s;
        }
        {{- end }}
        
        {{- if .Values.sonarqube.enabled }}
        upstream sonarqube {
            server {{ include "cuemarshal.fullname" . }}-sonarqube:9000 max_fails=3 fail_timeout=30s;
        }
        {{- end }}
        
        server {
            listen 80;
            server_name {{ include "cuemarshal.fqdn" . }};
            
            # Security headers
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            
            # Health check endpoint
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }
            
            # Gitea API (must come before /api/ to avoid Conductor catch-all)
            location /api/v1/ {
                proxy_pass http://gitea/api/v1/;
                proxy_set_header Host $http_host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $http_host;
                proxy_set_header X-Forwarded-Port $server_port;
                
                # CORS headers for mobile app
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                
                if ($request_method = 'OPTIONS') {
                    return 204;
                }
                
                proxy_connect_timeout 60;
                proxy_send_timeout 60;
                proxy_read_timeout 60;
            }
            
            # Conductor API
            location /api/ {
                proxy_pass http://conductor/api/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                
                # CORS headers for mobile app
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                
                if ($request_method = 'OPTIONS') {
                    return 204;
                }
                
                # Chat requests involve LLM tool-call loops that can take minutes
                proxy_connect_timeout 60;
                proxy_send_timeout 180;
                proxy_read_timeout 180;
            }
            
            {{- if .Values.sonarqube.enabled }}
            # SonarQube (Code Quality Dashboard)
            location = /sonar {
                return 301 /sonar/$is_args$args;
            }
            
            location /sonar/ {
                proxy_pass http://sonarqube/sonar/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }
            {{- end }}
            
            {{- if .Values.monitoring.enabled }}
            # Grafana (Monitoring Dashboard)
            location = /grafana {
                return 301 /grafana/$is_args$args;
            }
            
            location /grafana/ {
                proxy_pass http://grafana;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Prefix /grafana;
                
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }
            {{- end }}
            
            # Conductor WebSocket (real-time updates)
            location /ws {
                proxy_pass http://conductor/ws;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                
                # WebSocket timeout (24 hours)
                proxy_read_timeout 86400s;
                proxy_send_timeout 86400s;
            }
            
            # Gitea Webhooks (from Gitea to Conductor)
            location /webhooks/ {
                proxy_pass http://conductor/webhooks/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Gitea-Signature $http_x_gitea_signature;
                proxy_set_header X-Gitea-Event $http_x_gitea_event;
                proxy_set_header X-Gitea-Delivery $http_x_gitea_delivery;
                
                limit_req zone=webhook_limit burst=20 nodelay;
            }
            
            # Gitea auth and OAuth endpoints
            location /login/ {
                proxy_pass http://gitea/login/;
                proxy_set_header Host $http_host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $http_host;
                proxy_set_header X-Forwarded-Port $server_port;
                
                proxy_connect_timeout 60;
                proxy_send_timeout 60;
                proxy_read_timeout 60;
            }
            
            # Gitea user endpoints
            location /user/ {
                proxy_pass http://gitea/user/;
                proxy_set_header Host $http_host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $http_host;
                proxy_set_header X-Forwarded-Port $server_port;
                
                proxy_connect_timeout 60;
                proxy_send_timeout 60;
                proxy_read_timeout 60;
            }
            
            # Gitea source repositories
            location /gitea/ {
                proxy_pass http://gitea/;
                proxy_set_header Host $http_host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $http_host;
                proxy_set_header X-Forwarded-Port $server_port;
                
                # WebSocket support for Gitea SSH over HTTP
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                
                # Timeouts for long operations
                proxy_connect_timeout 300;
                proxy_send_timeout 300;
                proxy_read_timeout 300;
                send_timeout 300;
            }
            
            # Landing page (root path)
            location / {
                proxy_pass http://landing;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }
