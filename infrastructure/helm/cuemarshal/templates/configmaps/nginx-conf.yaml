apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cuemarshal.fullname" . }}-nginx-config
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: nginx
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        
        client_max_body_size 100M;
        sendfile on;
        keepalive_timeout 65;
        
        # Upstreams
        upstream gitea {
            server {{ include "cuemarshal.fullname" . }}-gitea:3000;
        }
        
        upstream conductor {
            server {{ include "cuemarshal.fullname" . }}-conductor:80;
        }
        
        server {
            listen 80;
            server_name {{ include "cuemarshal.fqdn" . }};
            
            # Health check endpoint
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }
            
            # Gitea (root path)
            location / {
                proxy_pass http://gitea;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
            
            # Conductor API
            location /api {
                proxy_pass http://conductor;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }
