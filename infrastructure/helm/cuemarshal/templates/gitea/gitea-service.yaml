apiVersion: v1
kind: Service
metadata:
  name: {{ include "cuemarshal.fullname" . }}-gitea
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: gitea
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3000
    targetPort: http
    protocol: TCP
  - name: ssh
    port: 22
    targetPort: ssh
    protocol: TCP
  selector:
    {{- include "cuemarshal.selectorLabels" . | nindent 4 }}
    component: gitea
