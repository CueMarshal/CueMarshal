apiVersion: v1
kind: Service
metadata:
  name: {{ include "cuemarshal.fullname" . }}-postgres
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: postgres
spec:
  type: ClusterIP
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
    protocol: TCP
  selector:
    {{- include "cuemarshal.selectorLabels" . | nindent 4 }}
    component: postgres
