{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cuemarshal.fullname" . }}-prometheus
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cuemarshal.fullname" . }}-prometheus
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: prometheus
rules:
- apiGroups: [""]
  resources: ["services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cuemarshal.fullname" . }}-prometheus
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cuemarshal.fullname" . }}-prometheus
subjects:
- kind: ServiceAccount
  name: {{ include "cuemarshal.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
{{- end }}
