{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cuemarshal.fullname" . }}-promtail
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: promtail
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 9080
    targetPort: http
  selector:
    {{- include "cuemarshal.selectorLabels" . | nindent 4 }}
    component: promtail
{{- end }}
