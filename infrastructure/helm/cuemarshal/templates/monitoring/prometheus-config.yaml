{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cuemarshal.fullname" . }}-prometheus-config
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: {{ .Values.workspace.slug | default "cuemarshal" | quote }}
        environment: 'kubernetes'

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
            labels:
              instance: 'control-plane'
              service: 'prometheus'

      - job_name: 'grafana'
        metrics_path: '/grafana/metrics'
        static_configs:
          - targets: ['{{ include "cuemarshal.fullname" . }}-grafana:3000']
            labels:
              instance: 'control-plane'
              service: 'grafana'

      - job_name: 'loki'
        static_configs:
          - targets: ['{{ include "cuemarshal.fullname" . }}-loki:3100']
            labels:
              instance: 'control-plane'
              service: 'loki'

      - job_name: 'promtail'
        static_configs:
          - targets: ['{{ include "cuemarshal.fullname" . }}-promtail:9080']
            labels:
              instance: 'control-plane'
              service: 'promtail'

      - job_name: 'kubernetes-service-endpoints'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              own_namespace: true
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            regex: (\d+);(.+)
            replacement: $2:$1
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
{{- end }}
