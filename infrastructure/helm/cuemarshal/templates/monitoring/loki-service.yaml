{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cuemarshal.fullname" . }}-loki
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: loki
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3100
    targetPort: http
  selector:
    {{- include "cuemarshal.selectorLabels" . | nindent 4 }}
    component: loki
{{- end }}
