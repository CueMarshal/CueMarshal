apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cuemarshal.fullname" . }}-mcp-conductor
  labels:
    {{- include "cuemarshal.labels" . | nindent 4 }}
    component: mcp-conductor
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cuemarshal.selectorLabels" . | nindent 6 }}
      component: mcp-conductor
  template:
    metadata:
      labels:
        {{- include "cuemarshal.selectorLabels" . | nindent 8 }}
        component: mcp-conductor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: mcp-conductor
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        image: {{ include "cuemarshal.image" (dict "Values" .Values "component" "mcp-conductor") }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: MCP_TRANSPORT
          value: "http"
        - name: PORT
          value: "80"
        - name: CONDUCTOR_URL
          value: "http://{{ include "cuemarshal.fullname" . }}-conductor"
        - name: CONDUCTOR_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: conductor-secret
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.postgres.user | default "cuemarshal" }}:$(POSTGRES_PASSWORD)@{{ include "cuemarshal.fullname" . }}-postgres:5432/{{ .Values.postgres.database | default "cuemarshal" }}"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "cuemarshal.fullname" . }}-secrets
              key: postgres-password
        ports:
        - name: http
          containerPort: 80
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.mcp.resources | nindent 10 }}
