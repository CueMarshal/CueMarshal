# Prometheus Configuration for CueMarshal System

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cuemarshal-local'
    environment: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
# rule_files:
#   - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'control-plane'
          service: 'prometheus'

  # PostgreSQL Exporter (if installed)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  #       labels:
  #         instance: 'control-plane'
  #         service: 'postgresql'

  # Redis Exporter (if installed)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #       labels:
  #         instance: 'control-plane'
  #         service: 'redis'

  # Monitoring stack metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          instance: 'control-plane'
          service: 'grafana'
    metrics_path: '/grafana/metrics'

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          instance: 'control-plane'
          service: 'loki'
    metrics_path: '/metrics'

  - job_name: 'promtail'
    static_configs:
      - targets: ['promtail:9080']
        labels:
          instance: 'control-plane'
          service: 'promtail'
    metrics_path: '/metrics'

  # MCP Servers
  - job_name: 'mcp-vector'
    static_configs:
      - targets: ['mcp-vector:80']
        labels:
          instance: 'control-plane'
          service: 'mcp-vector'
    metrics_path: '/health'

  - job_name: 'mcp-sonar'
    static_configs:
      - targets: ['mcp-sonar:80']
        labels:
          instance: 'control-plane'
          service: 'mcp-sonar'
    metrics_path: '/health'

  # Runners (if exposing metrics)
  # - job_name: 'runners'
  #   static_configs:
  #     - targets:
  #         - '192.168.1.11:8080'
  #         - '192.168.1.12:8080'
  #         - '192.168.1.13:8080'
  #       labels:
  #         service: 'runner'
