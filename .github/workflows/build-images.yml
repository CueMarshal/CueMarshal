name: Build and Publish Images

on:
  push:
    branches:
      - main
      - "release/**"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image:
          - conductor
          - gateway
          - runner
          - mcp-gitea
          - mcp-conductor
          - mcp-system
          - mcp-vector
          - mcp-sonar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare repository owner
        id: repo-owner
        run: |
          echo "owner_lc=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo-owner.outputs.owner_lc }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Determine build context and Dockerfile
        id: build-config
        run: |
          case "${{ matrix.image }}" in
            conductor|gateway)
              echo "context=services/${{ matrix.image }}" >> $GITHUB_OUTPUT
              echo "dockerfile=services/${{ matrix.image }}/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            runner)
              echo "context=services" >> $GITHUB_OUTPUT
              echo "dockerfile=services/runner/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            mcp-*)
              MCP_NAME="${{ matrix.image }}"
              DIR_NAME="${MCP_NAME#mcp-}-mcp"
              echo "context=services/mcp-servers" >> $GITHUB_OUTPUT
              echo "dockerfile=services/mcp-servers/${DIR_NAME}/Dockerfile" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.build-config.outputs.context }}
          file: ${{ steps.build-config.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  publish-helm-chart:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare repository owner
        id: repo-owner
        run: |
          echo "owner_lc=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            VERSION="0.0.1-latest"
          else
            BRANCH="${{ github.ref_name }}"
            SHA="${{ github.sha }}"
            VERSION="${BRANCH}-${SHA:0:7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Chart version: $VERSION"

      - name: Update Chart.yaml with version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" infrastructure/helm/cuemarshal/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" infrastructure/helm/cuemarshal/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package ./infrastructure/helm/cuemarshal --destination ./helm-packages

      - name: Push Helm chart to ACR
        run: |
          helm push ./helm-packages/cuemarshal-${{ steps.version.outputs.version }}.tgz \
            oci://ghcr.io/${{ steps.repo-owner.outputs.owner_lc }}/helm

      - name: Chart published
        run: |
          echo "Helm chart published to: oci://ghcr.io/${{ steps.repo-owner.outputs.owner_lc }}/helm:${{ steps.version.outputs.version }}"
