# YAML anchors for shared model_info and provider credential blocks.
# LiteLLM ignores unknown top-level keys; these exist only to define anchors.
x-model-info:
  small:  &model-info-small  { max_tokens: 8192,  mode: chat, supports_function_calling: true }
  medium: &model-info-medium { max_tokens: 32768, mode: chat, supports_function_calling: true }
  large:  &model-info-large  { max_tokens: 65536, mode: chat, supports_function_calling: true }

x-providers:
  groq:    &provider-groq    { api_key: "os.environ/GROQ_API_KEY" }
  gemini1: &provider-gemini1 { api_key: "os.environ/GEMINI_API_KEY" }
  gemini2: &provider-gemini2 { api_key: "os.environ/GEMINI_API_KEY_2" }
  gemini3: &provider-gemini3 { api_key: "os.environ/GEMINI_API_KEY_3" }
  azure:   &provider-azure   { api_key: "os.environ/AZURE_AI_API_KEY", api_base: "os.environ/AZURE_AI_API_BASE" }
  local:   &provider-local   { api_base: "os.environ/OLLAMA_BASE_URL", api_key: "local" }

