  # Priority: Local Ollama (0) → Groq (1) → Gemini 2.5 Flash (2, load-balanced across keys) → Azure AI (3)
  # ═══════════════════════════════════════════════════════
  - model_name: "tier1"
    litellm_params:
      <<: *provider-groq
      model: "groq/meta-llama/llama-4-scout-17b-16e-instruct"
      order: 1
    model_info: *model-info-small

  - model_name: "tier1"
