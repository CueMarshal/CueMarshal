sonar.projectKey=achingono_cuemarshal
sonar.projectName=cuemarshal
sonar.projectVersion=1.0

sonar.sources=services,mobile
sonar.exclusions=**/node_modules/**,**/dist/**,**/.git/**,**/coverage/**,**/prisma/migrations/**,**/assets/**,**/*.md

sonar.javascript.lcov.reportPaths=services/conductor/coverage/lcov.info,services/mcp-servers/coverage/lcov.info,mobile/coverage/lcov.info
sonar.typescript.lcov.reportPaths=services/conductor/coverage/lcov.info,services/mcp-servers/coverage/lcov.info,mobile/coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Suppress false positive: @custom-variant is valid Tailwind v4 syntax unknown to SonarQube's CSS parser
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.e1.resourceKey=services/landing/src/index.css
